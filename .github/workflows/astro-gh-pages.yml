name: 'Deploy Astro site to GitHub Pages'

on:
  # Auto-deploy whenever update-apps.yml finishes successfully.
  # Commits made by GITHUB_TOKEN do not trigger push events in other
  # workflows, so workflow_run is required to chain off update-apps.
  workflow_run:
    workflows: ['Update apps']
    types:
      - completed

  # Also rebuild when source files are changed directly on main
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "public/**"
      - "astro.config.mjs"
      - "package.json"

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # For workflow_run events only proceed if the upstream run succeeded
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history required so appdata.json.ts can resolve each app's
          # last-updated date via `git log` over the json/ directory
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Astro
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
